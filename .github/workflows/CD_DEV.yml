name: CD_DEV
run-name: "CD DEV ${{ inputs.version}}"

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'version'
        required: true
        default: ''

# env:
#   version: ${{ inputs.version}}

jobs:
  on-success:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      version: ${{ steps.set_version.outputs.version }}
    steps:
    - name: Exportar versión
      id: set_version
      run: echo "version=$VERSION" >> $GITHUB_OUTPUT
    - run: echo 'el numero de version es ${{ inputs.version }}'