# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: CICD
run-name: "CICD 1.0.${{ github.run_number }}"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
env:
  VERSION: 1.0.${{ github.run_number }}
jobs:
  Build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - run: echo "Hola soy el Build ${{ env.VERSION }}"
  DEV:
    name: Deploy Dev
    needs: Build
    runs-on: ubuntu-latest
    steps:
    - run: echo "Hola soy el Deploy dev ${{ env.VERSION }}"
  UAT:
    name: Deploy UAT
    needs: DEV
    runs-on: ubuntu-latest
    steps:
    - run: echo "Hola soy el Deploy UAT ${{ env.VERSION }}"
  PRD:
    name: Deploy Prod
    needs: UAT
    runs-on: ubuntu-latest
    steps:
    - run: echo "Hola soy el Deploy Prod ${{ env.VERSION }}"