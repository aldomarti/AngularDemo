# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: CICD
run-name: "CICD 1.0.${{ github.run_number }}"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
env:
  VERSION: 1.0.${{ github.run_number }}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - run: echo "Hola soy el Build ${{ env.VERSION }}"
  deployDev:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - run: echo "Hola soy el Deploy dev ${{ env.VERSION }}"
  deployUAT:
    needs: deployDev
    runs-on: ubuntu-latest
    steps:
    - run: echo "Hola soy el Deploy UAT ${{ env.VERSION }}"
  deployProd:
    needs: deployUAT
    runs-on: ubuntu-latest
    steps:
    - run: echo "Hola soy el Deploy Prod ${{ env.VERSION }}"